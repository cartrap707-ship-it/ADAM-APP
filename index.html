<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam Tech Store</title>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1c1c1e; padding: 40px; border-radius: 30px; text-align: center; width: 85%; max-width: 350px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .icon { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px; overflow: hidden; border: 3px solid #007aff; }
        .icon img { width: 100%; height: 100%; object-fit: cover; }
        h2 { margin: 10px 0 5px; font-size: 24px; }
        p { color: #8e8e93; font-size: 15px; margin-bottom: 30px; }
        .btn { background: #007aff; color: #fff; padding: 14px 60px; border-radius: 25px; text-decoration: none; font-weight: bold; font-size: 18px; display: inline-block; }
        .footer { margin-top: 20px; font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <img src="https://i.ibb.co/k6SRX1LB/image.png" alt="Adam Photo">
        </div>
        <h2>8 Ball Pool</h2>
        <p>Managed by Adam Tech</p>
        <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/cartrap707-ship-it/ADAM-APP/main/install.plist" class="btn">Install</a>
        <div class="footer">Open in Safari only</div>
    </div>
</body>
</html>
