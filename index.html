<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam Tech Store</title>
  <style>
        body { 
            background: radial-gradient(circle at top, #1a1a2e 0%, #000000 100%); 
            min-height: 100vh; 
            color: white; 
            font-family: -apple-system, sans-serif; 
            direction: rtl; 
            margin: 0; padding: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header img { width: 80px; height: 100px; border-radius: 20px; border: 2px solid #007aff; object-fit: cover; }
        
        /* الكرت الخاص بالتطبيق */
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border-radius: 25px; 
            padding: 20px; 
            margin-bottom: 20px;
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .icon-container img { width: 85px; height: 85px; border-radius: 20px; margin-bottom: 10px; }
        
        h2 { margin: 10px 0; font-size: 20px; color: #fff; }
        p { color: #8e8e93; font-size: 14px; margin-bottom: 20px; }
        
        /* الزر الفخم */
        .btn { 
            background: linear-gradient(135deg, #007aff, #0051af); 
            color: #fff; 
            padding: 12px 0; 
            width: 100%; 
            border-radius: 15px; 
            display: block; 
            text-decoration: none; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,122,255,0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://i.ibb.co/7N1vkJ0h/image.png" alt="Adam">
        <h1>Adam Tech Store</h1>
    </div>

    <div class="card">
        <div class="icon-container">
            <img src="https://i.ibb.co/hx51CV78/image.png" alt="8 Ball pool">
        </div>
        <h2>8 Ball Pool Hack</h2>
        <p>Managed by Adam Tech</p>
        <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/cartrap707-ship-it/ADAM-APP/main/install.plist" class="btn">Install</a>
    </div>

    <div class="card">
        <div class="icon-container">
            <img src="https://i.ibb.co/2Y6KCR2x/image.png" alt="Instagram">
        </div>
        <h2>Instagram Adam Tech</h2>
        <p>Managed by Adam Tech</p>
        <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/cartrap707-ship-it/ADAM-APP/main/insta.plist" class="btn">Install</a>
    </div>
<div class="card">
        <div class="icon-container">
            <img src="https://i.ibb.co/Vc8pvQt3\image.png" alt="Netflix">
        </div>
        <h2>Netflix Adam tech</h2>
        <p>Managed by Adam Tech</p>
        <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/cartrap707-ship-it/ADAM-APP/main/app.plist" class="btn">Install</a>
    </div>
</body>
</html>
