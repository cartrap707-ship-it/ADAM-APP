<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam Tech Store</title>
<style>
    body { 
        background: radial-gradient(circle at top, #1a1a2e 0%, #000000 100%); 
        min-height: 100vh; 
        color: #fff; 
        font-family: -apple-system, sans-serif; 
        margin: 0; 
        padding: 20px;
    }
    .header { text-align: center; margin-bottom: 30px; }
    .header img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #007aff; }
    
    .card { 
        background: rgba(255, 255, 255, 0.08) !important; 
        backdrop-filter: blur(20px) !important; 
        -webkit-backdrop-filter: blur(20px) !important; 
        border-radius: 30px; 
        padding: 25px; 
        text-align: center; 
        border: 1px solid rgba(255, 255, 255, 0.15); 
        margin-bottom: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    .icon-container { 
        width: 100px; height: 100px; 
        margin: 0 auto 15px; 
        border-radius: 22%; 
        overflow: hidden; 
    }
    .icon-container img { width: 100%; height: 100%; object-fit: cover; }
    
    h2 { margin: 10px 0 5px; font-size: 20px; font-weight: 600; }
    p { color: #8e8e93; font-size: 14px; margin-bottom: 20px; }
    
    .btn { 
        background: #007aff; 
        color: #fff; 
        padding: 12px 0; 
        width: 100%; 
        border-radius: 15px; 
        display: block; 
        text-decoration: none; 
        font-weight: bold; 
        transition: 0.3s;
    }
    .btn:active { transform: scale(0.98); opacity: 0.9; }
</style>
</head>
<body>

    <div class="header">
        <img src="https://i.ibb.co/7N1vkJ0h/image.png" alt="Adam">
        <h1>Adam Tech Store</h1>
    </div>

    <div class="card">
        <div class="icon-container">
            <img src="https://i.ibb.co/hx51CV78/image.png" alt="8 Ball pool">
        </div>
        <h2>8 Ball Pool Hack</h2>
        <p>Managed by Adam Tech</p>
        <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/cartrap707-ship-it/ADAM-APP/main/install.plist" class="btn">Install</a>
    </div>

    <div class="card">
        <div class="icon-container">
            <img src="https://i.ibb.co/2Y6KCR2x/image.png" alt="Instagram">
        </div>
        <h2>Instagram Adam Tech</h2>
        <p>Managed by Adam Tech</p>
        <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/cartrap707-ship-it/ADAM-APP/main/insta.plist" class="btn">Install</a>
    </div>
<div class="card">
        <div class="icon-container">
            <img src="https://i.ibb.co/Vc8pvQt3\image.png" alt="Netflix">
        </div>
        <h2>Netflix Adam tech</h2>
        <p>Managed by Adam Tech</p>
        <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/cartrap707-ship-it/ADAM-APP/main/app.plist" class="btn">Install</a>
    </div>
</body>
</html>
