body {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  min-height: 100vh;
  margin: 0;
  font-family: -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.header { text-align: center; margin-bottom: 30px; }

.header img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid #00c6ff;
  box-shadow: 0 0 20px rgba(0,198,255,0.5);
}

.header h1 {
  font-size: 28px;
  margin-top: 10px;
  letter-spacing: 1px;
}

.card { 
  background: rgba(255, 255, 255, 0.06); 
  backdrop-filter: blur(20px); 
  border-radius: 35px; 
  padding: 25px; 
  text-align: center; 
  border: 1px solid rgba(255, 255, 255, 0.1); 
  margin-bottom: 25px;
  width: 90%;
  max-width: 340px;
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

.icon-container img { 
  width: 90px; 
  height: 90px; 
  border-radius: 20px; 
  margin-bottom: 15px;
  object-fit: cover;
}

h2 { font-size: 20px; margin: 10px 0 5px; font-weight: 600; }

p { color: #8e8e93; font-size: 14px; margin-bottom: 20px; }

.btn { 
  background: linear-gradient(135deg, #007aff, #00c6ff);
  color: white;
  padding: 12px 0;
  width: 100%;
  border-radius: 15px;
  display: block;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  transition: 0.3s;
}

.btn:hover {
  opacity: 0.85;
}

.btn:active {
  transform: scale(0.97);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  backdrop-filter: blur(25px);
  background: rgba(0, 0, 0, 0.05);
  z-index: 0;
} 
body > * {
    position:relative;
    z-index:1;
}
/* منع تحديد النص أو النسخ في كل الصفحة */
* {
    -webkit-user-select: none; /* لمنع تحديد النص في الأيفون */
    -webkit-touch-callout: none; /* هذا هو السر: يمنع ظهور القائمة عند الضغط المطول */
}

/* استثناء الأزرار عشان تضل قابلة للضغط العادي */
.btn {
